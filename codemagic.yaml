workflows:
  android-release:
    name: Sentinel Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - sentinel_keystore
      vars:
        PACKAGE_NAME: "com.kaharian.sentinel"
      java: 17
    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Make gradlew executable
        script: chmod +x gradlew
      - name: Build release APK
        script: |
          ./gradlew assembleRelease             -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH             -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD             -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS             -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - kaharian.apps@gmail.com
        notify:
          success: true
          failure: true
